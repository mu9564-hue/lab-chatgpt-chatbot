<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Todo 앱</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>Todo 앱</h1>
      <form id="addForm">
        <input id="newTask" placeholder="새 할 일을 입력하세요" />
        <button type="submit">추가</button>
      </form>

      <div class="controls">
        <button id="clearCompleted">완료된 항목 모두 제거</button>
      </div>

      <ul id="tasks"></ul>
    </div>
    <script src="main.js"></script>
  </body>
</html>
